<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Teamwork — Proyecto colaborativo del curso de Git y GitHub. Estilo Minecraft.">
    <title>Teamwork</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" href="assets/computer.png">
</head>
<body>

    <!-- ============================================
         LOADING SCREEN — Minecraft World Generation
         ============================================ -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-text" id="loadingText">Generating world</div>
        <div class="loading-bar-container">
            <span class="loading-bar-label" id="loadingLabel">Building terrain</span>
            <div class="loading-bar">
                <div class="loading-bar-fill" id="loadingBarFill"></div>
            </div>
        </div>
    </div>

    <!-- ============================================
         TITLE SCREEN — Minecraft Menu Clone
         ============================================ -->
    <div class="title-screen" id="titleScreen">

        <!-- Panorama Background -->
        <div class="mc-panorama"></div>

        <!-- Scanline overlay -->
        <div class="scanlines"></div>

        <!-- Logo -->
        <div class="mc-logo-container">
            <span class="mc-logo">TEAMWORK</span>
            <span class="mc-logo-sub">GIT &amp; GITHUB EDITION</span>
            <div class="splash-text" id="splashText">Also try Git!</div>
        </div>

        <!-- Menu Buttons -->
        <div class="mc-menu">
            <button class="mc-button" id="btnGallery" onclick="showLoadingScreen('dashboard.html')">
                GALERIA DEL EQUIPO
            </button>
            <button class="mc-button" id="btnInstructions" onclick="showLoadingScreen('dashboard.html#instrucciones')">
                INSTRUCCIONES
            </button>
            <a href="avatar-builder.html" class="mc-button" id="btnAvatar">
                CREAR TU AVATAR
            </a>

            <div class="mc-button-row">
                <button class="mc-button mc-button-half" id="btnResources" onclick="showLoadingScreen('dashboard.html#recursos')">
                    Recursos
                </button>
                <a href="https://github.com" target="_blank" class="mc-button mc-button-half" id="btnGithub">
                    GitHub
                </a>
            </div>
        </div>
    </div>
    <!-- Version & Copyright -->
    <div class="mc-version">Teamwork v1.0</div>
    <div class="mc-copyright">
        Curso de Git &amp; GitHub // 2026<br>
    </div>

    <!-- Scripts -->
    <script>
        // Splash text randomizer
        (function() {
            var splashes = [
                "Also try Git!",
                "git push --force!",
                "Merge conflicts ahead!",
                "100% Redstone powered!",
                "Now with more commits!",
                "Ctrl+S saves lives!",
                "Don't mine at night!",
                "Branch and conquer!",
                "Forked!",
                "sudo make me a sandwich!",
                "Hello, World!",
                "It works on my machine!",
                "Powered by caffeine!",
                "git good!",
                "404: Sleep not found",
                "Committing crimes!",
                "NullPointerException!",
                "rm -rf / (DON'T!)",
                "while(alive) { code(); }",
                "Cherry-pick this!",
                "I don´t need to think, I got AI"
            ];
            var el = document.getElementById('splashText');
            if (el) {
                el.textContent = splashes[Math.floor(Math.random() * splashes.length)];
            }
        })();

        // Button press 8-bit tactile feedback
        document.querySelectorAll('.mc-button').forEach(function(btn) {
            btn.addEventListener('mousedown', function() {
                this.classList.add('mc-button-pressed');
            });
            btn.addEventListener('mouseup', function() {
                this.classList.remove('mc-button-pressed');
            });
            btn.addEventListener('mouseleave', function() {
                this.classList.remove('mc-button-pressed');
            });
        });

        // Loading screen — Minecraft world generation animation
        function showLoadingScreen(targetUrl) {
            var screen = document.getElementById('loadingScreen');
            var fill = document.getElementById('loadingBarFill');
            var label = document.getElementById('loadingLabel');
            var text = document.getElementById('loadingText');

            if (!screen || !fill) {
                window.location.href = targetUrl;
                return;
            }

            screen.classList.add('active');

            var stages = [
                { pct: 14, label: 'Building terrain' },
                { pct: 30, label: 'Preparing spawn area' },
                { pct: 48, label: 'Loading team data' },
                { pct: 64, label: 'Placing blocks' },
                { pct: 80, label: 'Spawning players' },
                { pct: 93, label: 'Almost done' },
                { pct: 100, label: 'Done!' }
            ];

            var i = 0;
            var interval = setInterval(function() {
                if (i >= stages.length) {
                    clearInterval(interval);
                    setTimeout(function() {
                        window.location.href = targetUrl;
                    }, 1000);
                    return;
                }
                fill.style.width = stages[i].pct + '%';
                if (label) label.textContent = stages[i].label;
                i++;
            }, 800);
        }
    </script>

</body>
</html>
