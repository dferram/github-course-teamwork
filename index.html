<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Teamwork — Proyecto colaborativo del curso de Git y GitHub. Estilo Minecraft.">
    <title>Teamwork</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" href="assets/computer.png">
</head>
<body>

    <!-- ============================================
         TITLE SCREEN — Minecraft Menu Clone
         ============================================ -->
    <div class="title-screen" id="titleScreen">

        <!-- Panorama Background -->
        <div class="mc-panorama"></div>

        <!-- Scanline overlay -->
        <div class="scanlines"></div>

        <!-- Logo -->
        <div class="mc-logo-container">
            <span class="mc-logo">TEAMWORK</span>
            <span class="mc-logo-sub">GIT & GITHUB EDITION</span>
        </div>

        <!-- Splash Text -->
        <div class="splash-text" id="splashText">Also try Git!</div>

        <!-- Menu Buttons -->
        <div class="mc-menu">
            <a href="dashboard.html" class="mc-button" id="btnGallery">
                GALERIA DEL EQUIPO
            </a>
            <a href="dashboard.html#instrucciones" class="mc-button" id="btnInstructions">
                INSTRUCCIONES
            </a>
            <a href="avatar-builder.html" class="mc-button" id="btnAvatar">
                CREAR TU AVATAR
            </a>

            <div class="mc-button-row">
                <a href="dashboard.html#recursos" class="mc-button mc-button-half" id="btnResources">
                    Recursos...
                </a>
                <a href="https://github.com" target="_blank" class="mc-button mc-button-half" id="btnGithub">
                    GitHub
                </a>
            </div>
        </div>

        <!-- Version & Copyright -->
        <div class="mc-version">Teamwork v1.0</div>
        <div class="mc-copyright">
            Curso de Git & GitHub // 2026<br>
            No distribuir sin permiso del instructor
        </div>

        <!-- Dirt Border -->
        <div class="dirt-border"></div>
    </div>

    <!-- Scripts -->
    <script>
        // Splash text randomizer
        (function() {
            var splashes = [
                "Also try Git!",
                "git push --force!",
                "Merge conflicts ahead!",
                "100% Redstone powered!",
                "Now with more commits!",
                "Ctrl+S saves lives!",
                "Don't mine at night!",
                "Branch and conquer!",
                "Forked!",
                "sudo make me a sandwich!",
                "Hello, World!",
                "It works on my machine!",
                "Powered by caffeine!",
                "git good!",
                "404: Sleep not found",
                "Committing crimes!",
                "NullPointerException!",
                "rm -rf / (DON'T!)",
                "while(alive) { code(); }",
                "Cherry-pick this!"
            ];
            var el = document.getElementById('splashText');
            if (el) {
                el.textContent = splashes[Math.floor(Math.random() * splashes.length)];
            }
        })();

        // Button press sound simulation (visual feedback)
        document.querySelectorAll('.mc-button').forEach(function(btn) {
            btn.addEventListener('mousedown', function() {
                this.style.transform = 'translateY(3px)';
            });
            btn.addEventListener('mouseup', function() {
                this.style.transform = '';
            });
            btn.addEventListener('mouseleave', function() {
                this.style.transform = '';
            });
        });
    </script>

</body>
</html>
