<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fernando Ramirez</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

    <div class="starfield" id="starfield"></div>

    <div class="container">

        <a href="../index.html" class="back-link">&lt; VOLVER A LA GALERIA</a>

        <section class="profile-hero">
            <div class="profile-avatar">
                <canvas id="myAvatar" width="96" height="96"></canvas>
            </div>
            <h1>FERNANDO RAMIREZ</h1>
            <p class="tagline">Never give up - Checo Perez</p>

            <div class="social-links">
                <!-- Se cargan automáticamente desde team.js -->
            </div>
        </section>

        <section class="profile-section">
            <h2>SOBRE MI</h2>
            <p>
                Este contenido se carga automáticamente desde team.js
            </p>
        </section>

        <section class="profile-section">
            <h2>SKILLS</h2>
            <div class="tags">
                <!-- Se cargan automáticamente desde team.js -->
            </div>
        </section>

        <section class="profile-section">
            <h2>DATO RANDOM</h2>
            <p>
                Este contenido se carga automáticamente desde team.js
            </p>
        </section>

    </div>

    <footer class="footer">
        <p>Hecho para el curso de Git & GitHub // 2026</p>
    </footer>

    <script src="../js/avatars.js?v=3"></script>
    <script src="../js/team.js?v=3"></script>
    <script src="../js/profile-loader.js?v=3"></script>
    <script>
        // Starfield
        (function() {
            var field = document.getElementById('starfield');
            if (!field) return;
            for (var i = 0; i < 80; i++) {
                var star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.setProperty('--duration', (2 + Math.random() * 4) + 's');
                star.style.setProperty('--delay', (Math.random() * 5) + 's');
                if (Math.random() > 0.7) { star.style.width = '3px'; star.style.height = '3px'; }
                field.appendChild(star);
            }
        })();
    </script>

</body>
</html>
