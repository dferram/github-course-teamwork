<!--
    =====================================================================
    📋 PLANTILLA DE PÁGINA PERSONAL
    =====================================================================

    ¿QUÉ HAGO CON ESTE ARCHIVO?

    PASO 1: COPIAR Y RENOMBRAR
       Copia este archivo y renómbralo con tu nombre:
       Ejemplo: juan-perez.html
       ⚠️ Usa minúsculas, guiones, SIN espacios ni acentos.

    PASO 2: (OPCIONAL) CAMBIAR EL <title>
       En la línea del <title>, cambia "Tu Nombre" por tu nombre real.
       Esto solo afecta el título de la pestaña del navegador.

    PASO 3: ¡LISTO! NO EDITES NADA MÁS
       NO necesitas escribir tu nombre, skills, ni nada en el HTML.
       Todo se carga AUTOMÁTICAMENTE desde js/team.js.

    =====================================================================
    🛡️ ¿POR QUÉ NO EDITO EL HTML?
    =====================================================================

    Porque si 20 personas editan el mismo archivo HTML, habrá merge
    conflicts por todos lados. En cambio, cada persona edita SOLO su
    propia línea en team.js — un archivo centralizado donde cada
    estudiante tiene su propio objeto independiente.

    El sistema (profile-loader.js) detecta qué página se está viendo
    y carga los datos correspondientes de team.js automáticamente.

    =====================================================================
    📖 ¿DÓNDE VAN MIS DATOS ENTONCES?
    =====================================================================

    En el archivo js/team.js. Abre ese archivo y agrega un objeto
    con tus datos debajo del comentario "AGREGA TU LINEA AQUI ABAJO".

    Ejemplo de cómo se ve una entrada en team.js:

    {
        name: "Juan Pérez",
        page: "pages/juan-perez.html",   ← ⚠️ DEBE coincidir con ESTE archivo
        tagline: "Code, coffee, repeat",
        avatar: "5555555555555555115555111615516116655661...",
        github: "https://github.com/juanperez",
        about: "Soy estudiante de ingeniería...",
        skills: ["HTML", "CSS", "JavaScript", "Python", "Git"],
        randomFact: "Puedo resolver un cubo Rubik en 2 minutos"
    },

    =====================================================================
    ❌ ERRORES COMUNES:
    =====================================================================

    - El campo "page" en team.js NO coincide con el nombre de este archivo
      → Tu página aparecerá en blanco
    - Olvidar la coma al final del objeto en team.js
      → JavaScript falla para TODOS
    - Escribir contenido directamente en este HTML
      → Se sobreescribe por el auto-loader, es trabajo perdido

    ¿Tienes dudas? Revisa FernandoRamirez.html como ejemplo terminado.
-->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- ⬇️ OPCIONAL: Cambia "Tu Nombre" por tu nombre real (solo afecta la pestaña del navegador) -->
    <title>Tu Nombre</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="icon" href="../assets/computer.png">
</head>
<body>

    <!-- Starfield (decorativo — no tocar) -->
    <div class="starfield" id="starfield"></div>

    <div class="container">

        <!-- Link para regresar a la galería -->
        <a href="../index.html" class="back-link">&lt; VOLVER A LA GALERIA</a>

        <!-- =====================================================================
             ⚠️ NO EDITES NADA DE AQUÍ PARA ABAJO
             Todo el contenido se carga automáticamente desde js/team.js
             ===================================================================== -->

        <section class="profile-hero">
            <div class="profile-avatar">
                <!-- El avatar se renderiza automáticamente desde team.js -->
                <canvas id="myAvatar" width="96" height="96"></canvas>
            </div>
            <!-- El nombre se carga automáticamente desde team.js -->
            <h1>TU NOMBRE COMPLETO</h1>
            <!-- El tagline se carga automáticamente desde team.js -->
            <p class="tagline">Tu tagline aquí</p>

            <div class="social-links">
                <!-- Los links sociales se cargan automáticamente desde team.js -->
            </div>
        </section>

        <section class="profile-section">
            <h2>SOBRE MI</h2>
            <!-- El texto "about" se carga automáticamente desde team.js -->
            <p>
                Este contenido se carga automáticamente desde team.js
            </p>
        </section>

        <section class="profile-section">
            <h2>SKILLS</h2>
            <div class="tags">
                <!-- Los skills se cargan automáticamente desde team.js -->
            </div>
        </section>

        <section class="profile-section">
            <h2>DATO RANDOM</h2>
            <!-- El randomFact se carga automáticamente desde team.js -->
            <p>
                Este contenido se carga automáticamente desde team.js
            </p>
        </section>

    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>Hecho para el curso de Git &amp; GitHub // 2026</p>
    </footer>

    <!-- Scripts del sistema — NO EDITAR -->
    <script src="../js/avatars.js?v=3"></script>
    <script src="../js/team.js?v=3"></script>
    <script src="../js/profile-loader.js?v=3"></script>
    <script>
        // Starfield (decorativo)
        (function() {
            var field = document.getElementById('starfield');
            if (!field) return;
            for (var i = 0; i < 80; i++) {
                var star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.setProperty('--duration', (2 + Math.random() * 4) + 's');
                star.style.setProperty('--delay', (Math.random() * 5) + 's');
                if (Math.random() > 0.7) { star.style.width = '3px'; star.style.height = '3px'; }
                field.appendChild(star);
            }
        })();
    </script>

</body>
</html>
