<!--
    INSTRUCCIONES PARA CREAR TU PÁGINA PERSONAL                           
    Esta es tu plantilla para crear tu página personal del equipo.
    
    PASO 1: COPIAR ESTE ARCHIVO
    
    En la carpeta "pages/", copia este archivo y renómbralo con tu nombre:
    
        Ejemplo: juan-perez.html
        
    IMPORTANTE: Usa minúsculas y guiones, sin espacios ni acentos.
    
    PASO 2: EDITAR EL TÍTULO DE LA PÁGINA (línea 23)
    
    Cambia <title>Tu Nombre</title> por tu nombre real:
    
        <title>Juan Pérez</title>
    
    PASO 3: REGISTRAR TU INFORMACIÓN EN team.js
    
    Abre el archivo "js/team.js" y agrega TU información al final del array.
    Copia el template que está en ese archivo y llena TODOS los campos:
    
        - name: Tu nombre completo
        - page: "pages/tu-archivo.html" (debe coincidir con el nombre de ESTE archivo)
        - tagline: Una frase corta sobre ti
        - avatar: El código de tu avatar del builder (ver PASO 4)
        - github: Tu perfil de GitHub
        - about: Un párrafo sobre ti
        - skills: ["Skill1", "Skill2", "Skill3"]
        - randomFact: Un dato curioso sobre ti
    
    PASO 4: CREAR TU AVATAR
    
    Abre "avatar-builder.html" en tu navegador y:
    
        1. Elige un preset (steve, zombie, creeper, etc.) O dibuja tu propio avatar
        2. Personaliza los colores primario y secundario
        3. Copia el CÓDIGO que aparece en "Avatar Code" (64 caracteres)
        4. Pega el código en el campo "avatar" de tu objeto en team.js
        
    Los colores se guardan automáticamente en el código del avatar.
    
    PASO 5: ¡LISTO!
    
    NO necesitas editar NADA más en este archivo HTML.
    Todo el contenido (nombre, foto, skills, etc.) se carga AUTOMÁTICAMENTE
    desde team.js cuando abres tu página.
    
    Esto evita conflictos de Git porque cada estudiante solo edita SU línea
    en team.js, no todo el archivo HTML.
    
    EJEMPLO DE CÓMO SE VE UNA ENTRADA EN team.js:
    
    {
        name: "Juan Pérez",
        page: "pages/juan-perez.html",
        tagline: "Code, coffee, repeat",
        avatar: "5555555555555555115555111615516116655661511551155555555555555555",
        github: "https://github.com/juanperez",
        about: "Soy estudiante de ingeniería apasionado por la tecnología...",
        skills: ["HTML", "CSS", "JavaScript", "Python", "Git"],
        randomFact: "Puedo resolver un cubo Rubik en 2 minutos"
    },
    
    ¿Tienes dudas? Revisa FernandoRamirez.html como ejemplo de una página
    terminada, o consulta las instrucciones completas en index.html
    
-->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Nombre</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="icon" href="../assets/computer.png">
</head>
<body>

    <!-- Starfield (puedes quitarlo si quieres) -->
    <div class="starfield" id="starfield"></div>

    <div class="container">

        <!-- Link para regresar -->
        <a href="../index.html" class="back-link">&lt; VOLVER A LA GALERIA</a>

        <section class="profile-hero">
            <div class="profile-avatar">
                <canvas id="myAvatar" width="96" height="96"></canvas>
            </div>
            <h1>TU NOMBRE COMPLETO</h1>
            <p class="tagline">Tu tagline aquí</p>

            <div class="social-links">
                <!-- Se cargan automáticamente desde team.js -->
            </div>
        </section>

        <section class="profile-section">
            <h2>SOBRE MI</h2>
            <p>
                Este contenido se carga automáticamente desde team.js
            </p>
        </section>

        <section class="profile-section">
            <h2>SKILLS</h2>
            <div class="tags">
                <!-- Se cargan automáticamente desde team.js -->
            </div>
        </section>

        <section class="profile-section">
            <h2>DATO RANDOM</h2>
            <p>
                Este contenido se carga automáticamente desde team.js
            </p>
        </section>

    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>Hecho para el curso de Git & GitHub // 2026</p>
    </footer>

    <script src="../js/avatars.js?v=3"></script>
    <script src="../js/team.js?v=3"></script>
    <script src="../js/profile-loader.js?v=3"></script>
    <script>
        // Starfield
        (function() {
            var field = document.getElementById('starfield');
            if (!field) return;
            for (var i = 0; i < 80; i++) {
                var star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.setProperty('--duration', (2 + Math.random() * 4) + 's');
                star.style.setProperty('--delay', (Math.random() * 5) + 's');
                if (Math.random() > 0.7) { star.style.width = '3px'; star.style.height = '3px'; }
                field.appendChild(star);
            }
        })();
    </script>

</body>
</html>
